<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LPPM ITB Yadika - Admin Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #1e293b;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient subtle white circles */
        .ambient-circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            pointer-events: none;
            z-index: 0;
        }
        .circle-1 { width: 400px; height: 400px; top: -100px; left: -100px; }
        .circle-2 { width: 300px; height: 300px; bottom: -50px; right: -50px; }

        .container {
            background: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15), 0 5px 15px rgba(0, 0, 0, 0.05);
            padding: 50px 40px;
            width: 100%;
            max-width: 480px;
            position: relative;
            z-index: 10;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #d97706, #fbbf24);
        }

        .admin-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
            text-align: center;
        }

        .brand-logo {
            width: 65px;
            height: 65px;
            object-fit: contain;
            border-radius: 14px;
            background: #f8fafc;
            padding: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 12px;
            border: 2px solid #d97706;
            transition: all 0.3s ease;
        }

        .brand-logo:hover {
            transform: scale(1.05);
        }

        .brand-title {
            font-size: 20px;
            font-weight: 800;
            color: #1e293b;
            letter-spacing: 0.3px;
        }

        .portal-badge {
            margin-top: 8px;
            padding: 4px 12px;
            background: #fef3c7;
            border: 1px solid #fde68a;
            color: #b45309;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-radius: 100px;
        }

        h2 {
            color: #1e293b;
            margin-bottom: 25px;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.3px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #475569;
            margin-bottom: 6px;
            font-size: 13.5px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 13px 16px;
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            color: #1e293b;
            font-size: 15px;
            transition: all 0.2s ease;
        }

        .form-group input::placeholder {
            color: #94a3b8;
        }

        .form-group input:focus {
            outline: none;
            border-color: #fbbf24;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.15);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #d97706 0%, #b45309 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(217, 119, 6, 0.25);
            display: flex;
            justify-content: center;
            align-items: center;
            letter-spacing: 0.5px;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(217, 119, 6, 0.35);
            opacity: 0.95;
        }

        .btn:active {
            transform: translateY(0.5px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .success-message, .error-message {
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            animation: slideDown 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .success-message {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .error-message {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .back-link {
            text-align: center;
            margin-top: 30px;
            font-size: 13px;
        }

        .back-link a {
            color: #64748b;
            text-decoration: none;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-weight: 600;
        }

        .back-link a:hover {
            color: #d97706;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="ambient-circle circle-1"></div>
    <div class="ambient-circle circle-2"></div>

    <div class="container">
        <div class="admin-header">
            <img src="yadika.png" alt="Logo ITB Yadika" class="brand-logo">
            <div class="brand-title">LPPM ITB YADIKA</div>
            <div class="portal-badge">🔒 PANEL ADMINISTRATOR</div>
        </div>

        <h2>Autentikasi Admin</h2>
        <div id="loginMessage"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="loginEmail">Email Administrator</label>
                <input type="email" id="loginEmail" required placeholder="admin@yadika.ac.id">
            </div>

            <div class="form-group">
                <label for="loginPassword">Password Akses</label>
                <input type="password" id="loginPassword" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn" id="loginBtn">
                <span id="loginBtnText">Masuk ke Panel</span>
            </button>
        </form>

        <div class="back-link">
            <a href="login.html">
                ← Kembali ke Portal Utama
            </a>
        </div>
    </div>

    <script>
        const API_CONFIG = {
            BASE_URL: window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
                ? 'http://localhost:3000'
                : ''
        };

        function showMessage(message, isSuccess = false) {
            const messageEl = document.getElementById('loginMessage');
            messageEl.innerHTML = `<div class="${isSuccess ? 'success-message' : 'error-message'}">${message}</div>`;
            setTimeout(() => {
                messageEl.innerHTML = '';
            }, 5000);
        }

        function setLoading(isLoading) {
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('loginBtnText');
            
            if (isLoading) {
                btn.disabled = true;
                btnText.innerHTML = '<span class="loading-spinner"></span> Memverifikasi...';
            } else {
                btn.disabled = false;
                btnText.textContent = 'Masuk ke Panel';
            }
        }

        const loginForm = document.getElementById('loginForm');
        if (loginForm) {
            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const email = document.getElementById('loginEmail').value.trim();
                const password = document.getElementById('loginPassword').value;
                
                if (!email || !password) {
                    showMessage('Email dan password wajib diisi!');
                    return;
                }
                
                setLoading(true);

                try {
                    const response = await fetch(`${API_CONFIG.BASE_URL}/api/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password, isAdmin: true, isDosen: false })
                    });
                        
                    const data = await response.json();
                    setLoading(false);
                    
                    if (!response.ok) {
                        showMessage(data.message || 'Gagal masuk sebagai admin!');
                        return;
                    }

                    // Save session details
                    localStorage.setItem('token', data.data.token);
                    localStorage.setItem('user', JSON.stringify(data.data.user));

                    showMessage('Autentikasi berhasil! Sedang dialihkan...', true);

                    setTimeout(() => {
                        window.location.href = 'admin/admin-dashboard.html';
                    }, 1500);
                } catch (error) {
                    console.error('Error:', error);
                    setLoading(false);
                    showMessage('Terjadi kesalahan jaringan saat mencoba masuk!');
                }
            });
        }

        // Auto-redirect if already logged in as Admin
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            
            if (token && user.id && user.isAdmin) {
                window.location.href = 'admin/admin-dashboard.html';
            }
        });
    </script>
</body>
</html>
